<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 100" fill="none" role="img" aria-label="Tim Rammensee — Photography & Film">
  <!-- Horizontale Logo-Sperre: TR-Monogramm (T | R) + Wortmarke. T in currentColor, R + Linie in Akzent. -->
  <g transform="translate(8,14)">
    <text x="22" y="58" text-anchor="middle" fill="currentColor"
          font-family="'Cormorant Garamond', Georgia, serif" font-size="56" font-weight="600">T</text>
    <line x1="46" y1="14" x2="46" y2="60" stroke="#e0b384" stroke-width="2.2" stroke-linecap="round"/>
    <text x="71" y="58" text-anchor="middle" fill="#e0b384"
          font-family="'Cormorant Garamond', Georgia, serif" font-size="56" font-weight="600">R</text>
  </g>
  <g>
    <text x="112" y="50" font-family="'Cormorant Garamond', Georgia, serif" font-size="38" font-weight="600" letter-spacing="0.5" fill="currentColor">Tim Rammensee</text>
    <text x="114" y="71" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" letter-spacing="6.5" fill="#e0b384">PHOTOGRAPHY · FILM</text>
  </g>
</svg>
