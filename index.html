<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#080808;color:#ede8e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate{width:100%;max-width:380px;text-align:center;}
  .logo{display:inline-flex;align-items:center;gap:15px;margin-bottom:48px;}

  .logo-name{font-size:18px;font-weight:500;letter-spacing:0.1em;color:#ede8e0;text-transform:uppercase;line-height:1.1;}
  .logo-sub{font-size:10px;font-weight:400;letter-spacing:0.28em;color:#c9a96e;text-transform:uppercase;}
  .soon{font-size:11px;letter-spacing:0.32em;color:#c9a96e;text-transform:uppercase;margin-bottom:14px;}
  h1{font-size:32px;font-weight:700;letter-spacing:-1px;color:#fff;margin-bottom:16px;}
  .lead{font-size:14px;color:#888;line-height:1.6;margin-bottom:40px;}
  form{display:flex;flex-direction:column;gap:12px;}
  input{background:rgba(255,255,255,0.04);border:0.5px solid rgba(201,169,110,0.25);border-radius:12px;padding:14px 16px;font-size:15px;color:#ede8e0;outline:none;font-family:inherit;width:100%;transition:border-color 0.2s;}
  input::placeholder{color:#555;}
  input:focus{border-color:rgba(201,169,110,0.6);}
  button{background:linear-gradient(135deg,#d9c08a,#8a6f3d);color:#0d0d0d;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity 0.2s;}
  button:hover{opacity:0.9;}
  button:disabled{opacity:0.5;cursor:wait;}
  .err{font-size:13px;color:#e07a6a;min-height:18px;margin-top:2px;}
  .foot{margin-top:40px;font-size:11px;color:#3a3a3a;letter-spacing:0.04em;}
</style>

const USER = "p.keuerleber";
const ITER = 50000;
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decryptViaSubtle(pw){
  const enc = new TextEncoder();
  const salt = b64(PAYLOAD.salt), iv = b64(PAYLOAD.iv), data = b64(PAYLOAD.data);
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:ITER, hash:'SHA-256' },
    baseKey, { name:'AES-CBC', length:256 }, false, ['decrypt']);
  const ptBuf = await crypto.subtle.decrypt({ name:'AES-CBC', iv }, key, data);
  return new TextDecoder().decode(ptBuf);
}

function decryptViaCryptoJS(pw){
  if (typeof CryptoJS === 'undefined') throw new Error('lib');
  const salt = CryptoJS.enc.Base64.parse(PAYLOAD.salt);
  const iv   = CryptoJS.enc.Base64.parse(PAYLOAD.iv);
  const ct   = CryptoJS.enc.Base64.parse(PAYLOAD.data);
  const key  = CryptoJS.PBKDF2(pw, salt, { keySize:8, iterations:ITER, hasher:CryptoJS.algo.SHA256 });
  const dec  = CryptoJS.AES.decrypt({ ciphertext: ct }, key, { iv:iv, mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7 });
  return dec.toString(CryptoJS.enc.Utf8);
}

async function decryptSite(pw){
  const useSubtle = (window.isSecureContext && window.crypto && window.crypto.subtle);
  const text = useSubtle ? await decryptViaSubtle(pw) : decryptViaCryptoJS(pw);
  if (!text || !text.startsWith('KRE-OK\n')) throw new Error('marker');
  return text.slice(7);
}

function reveal(html){
  sessionStorage.setItem('kre_unlocked','1');
  document.open(); document.write(html); document.close();
}

const form = document.getElementById('loginForm');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');
  err.textContent = '';
  const u = document.getElementById('user').value.trim();
  const p = document.getElementById('pass').value;
  if (u.toLowerCase() !== USER) { err.textContent = 'Benutzername oder Passwort falsch.'; return; }
  btn.disabled = true; btn.textContent = 'Wird geprüft…';
  try {
    const html = await decryptSite(p);
    reveal(html);
  } catch (ex) {
    err.textContent = 'Benutzername oder Passwort falsch.';
    btn.disabled = false; btn.textContent = 'Freischalten';
  }
});
