# Netlify deploy config — publishes the Tim Rammensee photographer site.
#
# Deploy: import this repository in Netlify and select the correct branch.
# No build command needed — this file points Netlify at the site folder.
# (Alternative without Git: open app.netlify.com/drop and drag the
#  "tim-rammensee" folder onto the page.)

[build]
  publish = "tim-rammensee"
  command = ""

# Contact form (Netlify Forms) works automatically once deployed here —
# no Formspree or account ID required. Submissions appear under
# Netlify → your site → Forms.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
